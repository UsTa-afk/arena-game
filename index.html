<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arena Battle - Fighter Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-styles">
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap");
body {
    font-family: "Montserrat", sans-serif;
    overflow: hidden;
}
.bg-arena {
    background-color: #0f172a;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
.glass-card {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(8px);
}
.glow-yellow {
    box-shadow: 0 0 15px rgba(234, 179, 8, 0.5), inset 0 0 10px rgba(234, 179, 8, 0.2);
    border-color: rgba(234, 179, 8, 0.8);
}
.glow-cyan {
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.5), inset 0 0 10px rgba(6, 182, 212, 0.2);
    border-color: rgba(6, 182, 212, 0.8);
}
.glow-orange {
    box-shadow: 0 0 15px rgba(249, 115, 22, 0.5), inset 0 0 10px rgba(249, 115, 22, 0.2);
    border-color: rgba(249, 115, 22, 0.8);
}
.btn-3d {
    box-shadow: 0 4px 0 0 rgba(21, 128, 61, 1);
    transition: all 0.1s ease;
}
.btn-3d:active {
    transform: translatey(4px);
    box-shadow: 0 0 0 0 rgba(21, 128, 61, 1);
}
.btn-reset {
    box-shadow: 0 2px 0 0 rgba(51, 65, 85, 1);
    transition: all 0.1s ease;
}
.btn-reset:active {
    transform: translatey(2px);
    box-shadow: 0 0 0 0 rgba(51, 65, 85, 1);
}
.weapon-card {
    transition: all 0.3s ease;
}
.p1-selected {
    border-color: #ef4444 !important;
    box-shadow: 0 0 25px rgba(239, 68, 68, 0.8), inset 0 0 15px rgba(239, 68, 68, 0.4) !important;
    transform: scale(1.05);
}
.p2-selected {
    border-color: #3b82f6 !important;
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.8), inset 0 0 15px rgba(59, 130, 246, 0.4) !important;
    transform: scale(1.05);
}
#startBtn {
    opacity: 0.5;
    pointer-events: none;
}
#startBtn.ready {
    opacity: 1;
    pointer-events: all;
}
canvas {
    border: 4px solid #1e293b;
    background-color: #fcf9f2;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    display: none;
    position: absolute;
    z-index: 50;
    border-radius: 8px;
}
@keyframes shake {
    0% { transform: translate(2px, 2px) rotate(0deg); }
    20% { transform: translate(-2px, -2px) rotate(-1deg); }
    40% { transform: translate(-3px, 0px) rotate(1deg); }
    60% { transform: translate(3px, 2px) rotate(0deg); }
    80% { transform: translate(1px, -2px) rotate(-1deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
}
.shake {
    animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
}
#restartBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 24px;
    background: #ef4444;
    color: white;
    border: none;
    cursor: pointer;
    display: none;
    font-weight: bold;
    border-radius: 8px;
    z-index: 60;
    font-family: "Montserrat", sans-serif;
    box-shadow: 0 4px 0 0 #b91c1c;
    transition: all 0.1s ease;
}
#restartBtn:active {
    transform: translatey(4px);
    box-shadow: 0 0 0 0 #b91c1c;
}
</style>
</head>
<body class="bg-arena min-h-screen flex items-center justify-center text-white relative">
<div class="absolute inset-0 bg-slate-900/60 z-0"></div>

<main id="menu" class="relative z-10 w-full max-w-5xl px-4 py-8 flex flex-col items-center">
    <header class="text-center mb-12">
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-wider mb-2 drop-shadow-lg">ARENA BATTLE</h1>
        <p id="statusText" class="text-xl font-semibold text-slate-200 drop-shadow-md">Player 1: Choose your fighter</p>
    </header>

    <section class="flex flex-row justify-center items-center gap-8 w-full max-w-5xl mb-4">
        <article class="weapon-card glass-card rounded-2xl p-6 border-2 glow-yellow flex flex-col items-center text-center cursor-pointer hover:scale-105 w-64 h-[350px]" onclick="selectWeapon('Sword')">
            <div class="w-32 h-40 mb-4 flex items-center justify-center">
                <img alt="Sword" class="max-w-full max-h-full object-contain filter drop-shadow-[0_0_8px_rgba(234,179,8,0.8)]" src="sword.png"/>
            </div>
            <h2 class="text-2xl font-bold mb-4 tracking-wide">SWORD</h2>
            <div class="w-full text-left space-y-3 mt-auto">
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span>HP: 100</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-yellow-400 h-2 rounded-full" style="width: 100%"></div>
                    </div>
                </div>
                <div class="text-sm font-semibold">Speed: Fast</div>
            </div>
        </article>

        <article class="weapon-card glass-card rounded-2xl p-6 border-2 glow-cyan flex flex-col items-center text-center cursor-pointer hover:scale-105 w-64 h-[350px]" onclick="selectWeapon('Spear')">
            <div class="w-32 h-40 mb-4 flex items-center justify-center">
                <img alt="Spear" class="max-w-full max-h-full object-contain filter drop-shadow-[0_0_8px_rgba(6,182,212,0.8)]" src="spear.png"/>
            </div>
            <h2 class="text-2xl font-bold mb-4 tracking-wide">SPEAR</h2>
            <div class="w-full text-left space-y-3 mt-auto">
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span>HP: 80</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-cyan-400 h-2 rounded-full" style="width: 80%"></div>
                    </div>
                </div>
                <div class="text-sm font-semibold">Special: Grows longer</div>
            </div>
        </article>

        <article class="weapon-card glass-card rounded-2xl p-6 border-2 glow-orange flex flex-col items-center text-center cursor-pointer hover:scale-105 w-64 h-[350px]" onclick="selectWeapon('Axe')">
            <div class="w-32 h-40 mb-4 flex items-center justify-center">
                <img alt="Axe" class="max-w-full max-h-full object-contain filter drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]" src="axe.png"/>
            </div>
            <h2 class="text-2xl font-bold mb-4 tracking-wide">AXE</h2>
            <div class="w-full text-left space-y-3 mt-auto">
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span>HP: 150</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-orange-500 h-2 rounded-full" style="width: 100%"></div>
                    </div>
                </div>
                <div class="text-sm font-semibold">Special: Lifesteal</div>
            </div>
        </article>
    </section>

    <section class="flex flex-row items-center gap-6 mt-8">
        <button id="resetMenuBtn" class="bg-slate-500/50 hover:bg-slate-500/70 border border-slate-400 text-slate-200 font-medium py-2 px-4 rounded-lg text-sm transition-colors" onclick="resetSelection()">
            Reset Selection
        </button>
        <button id="startBtn" class="btn-3d bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white font-bold py-3 px-10 rounded-xl text-xl uppercase tracking-wider drop-shadow-md" onclick="startGame()">
            START FIGHT
        </button>
    </section>
</main>

<canvas id="gameCanvas" width="600" height="600"></canvas>
<button id="restartBtn" onclick="location.reload()">RESET GAME</button>

<script>
    const weaponStats = {
        'Sword': { color: '#fce883', hp: 100, radius: 35, speed: 4, src: 'sword.png' },
        'Spear': { color: '#5dd1b2', hp: 80, radius: 25, speed: 6, src: 'spear.png' },
        'Axe':   { color: '#e67e22', hp: 150, radius: 45, speed: 2.5, src: 'axe.png' }
    };

    let player1Choice = null;
    let player2Choice = null;

    function selectWeapon(type) {
        const cards = document.querySelectorAll('.weapon-card');
        const status = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');

        if (!player1Choice) {
            player1Choice = type;
            highlightCard(cards, type, 'p1-selected');
            status.innerText = "Player 2: Choose your fighter";
            status.style.color = "#3b82f6";
        } else if (!player2Choice && player1Choice !== type) {
            player2Choice = type;
            highlightCard(cards, type, 'p2-selected');
            status.innerText = "Ready to Fight!";
            status.style.color = "#22c55e";
            startBtn.classList.add('ready');
        }
    }

    function highlightCard(cards, type, cssClass) {
        cards.forEach(card => {
            if(card.innerText.includes(type)) {
                card.classList.add(cssClass);
            }
        });
    }

    function resetSelection() {
        player1Choice = null;
        player2Choice = null;
        const cards = document.querySelectorAll('.weapon-card');
        cards.forEach(card => {
            card.classList.remove('p1-selected');
            card.classList.remove('p2-selected');
        });
        const status = document.getElementById('statusText');
        status.innerText = "Player 1: Choose your fighter";
        status.style.color = "#e2e8f0";
        document.getElementById('startBtn').classList.remove('ready');
    }

    const hitSound = new Audio('clash.mp3');

    function playHitSound() {
        let soundClone = hitSound.cloneNode();
        soundClone.volume = 0.6;
        soundClone.play().catch(e => console.log(e));
    }

    function triggerShake() {
        const canvasEl = document.getElementById('gameCanvas');
        canvasEl.classList.remove('shake');
        void canvasEl.offsetWidth;
        canvasEl.classList.add('shake');
    }

    function startGame() {
        if (!player1Choice || !player2Choice) return;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('gameCanvas').style.display = 'block';
        document.getElementById('restartBtn').style.display = 'block';
        
        hitSound.play().then(() => {
            hitSound.pause();
            hitSound.currentTime = 0;
        }).catch(e => console.log(e));

        createBall(player1Choice, 1);
        createBall(player2Choice, 2);
        animate();
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let isPaused = false;
    let balls = []; 
    let particles = [];
    let p1Ball = null;
    let p2Ball = null;

    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey) {
            isPaused = !isPaused;
        }
    });

    class Particle {
        constructor(x, y, dx, dy, color) {
            this.x = x;
            this.y = y;
            this.radius = Math.random() * 4 + 1;
            this.dx = dx;
            this.dy = dy;
            this.color = color;
            this.alpha = 1;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.x += this.dx;
            this.y += this.dy;
            this.alpha -= 0.04;
        }
    }

    function spawnParticles(x, y, color) {
        for (let k = 0; k < 15; k++) {
            const pDx = (Math.random() - 0.5) * 10;
            const pDy = (Math.random() - 0.5) * 10;
            particles.push(new Particle(x, y, pDx, pDy, color));
        }
    }

    class Ball {
        constructor(x, y, radius, dx, dy, color, health, type, src) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.dx = dx;
            this.dy = dy;
            this.mass = radius;
            this.color = color;
            this.health = health;
            this.type = type;
            this.img = new Image();
            this.img.src = src;
            this.angle = 0;
            this.spinSpeed = (Math.random() * 0.05) + 0.05;
            this.wLength = radius * 2.5;
            this.wWidth = radius * 0.6;
            this.iframes = 0;
            this.damage = 1;
            this.weaponCooldown = 0;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = (this.iframes > 0 && Math.floor(Date.now() / 100) % 2 === 0) ? '#fff' : this.color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();
            ctx.closePath();

            ctx.fillStyle = '#000';
            let fontSize = Math.floor(this.radius * 0.7);
            ctx.font = 'bold ' + fontSize + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(Math.max(0, Math.floor(this.health)), this.x, this.y);

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            const drawOffset = this.radius + 5;

            if (this.img.complete && this.img.naturalWidth !== 0) {
                ctx.drawImage(this.img, drawOffset, -this.wWidth / 2, this.wLength, this.wWidth);
            } else {
                ctx.fillStyle = '#333';
                ctx.fillRect(drawOffset, -this.wWidth / 2, this.wLength, this.wWidth);
                ctx.strokeStyle = '#000';
                ctx.strokeRect(drawOffset, -this.wWidth / 2, this.wLength, this.wWidth);
            }
            ctx.restore();
        }

        update() {
            if (this.x + this.radius > canvas.width) {
                this.x = canvas.width - this.radius;
                this.dx = -this.dx;
            } else if (this.x - this.radius < 0) {
                this.x = this.radius;
                this.dx = -this.dx;
            }

            if (this.y + this.radius > canvas.height) {
                this.y = canvas.height - this.radius;
                this.dy = -this.dy;
            } else if (this.y - this.radius < 0) {
                this.y = this.radius;
                this.dy = -this.dy;
            }

            this.x += this.dx;
            this.y += this.dy;
            this.angle += this.spinSpeed;

            if (this.iframes > 0) this.iframes--;
            if (this.weaponCooldown > 0) this.weaponCooldown--;
        }
    }

    function createBall(type, playerNum) {
        const stats = weaponStats[type];
        let x = (playerNum === 1) ? 150 : 450;
        let y = 300;
        let dx = (playerNum === 1) ? stats.speed : -stats.speed;
        let dy = (Math.random() * 4) - 2; 

        let newBall = new Ball(x, y, stats.radius, dx, dy, stats.color, stats.hp, type, stats.src);
        balls.push(newBall);
        
        if (playerNum === 1) p1Ball = newBall;
        if (playerNum === 2) p2Ball = newBall;
    }

    function rotate(dx, dy, angle) {
        return {
            x: dx * Math.cos(angle) - dy * Math.sin(angle),
            y: dx * Math.sin(angle) + dy * Math.cos(angle)
        };
    }

    function resolveCollision(ball1, ball2) {
        const xVelocityDiff = ball1.dx - ball2.dx;
        const yVelocityDiff = ball1.dy - ball2.dy;
        const xDist = ball2.x - ball1.x;
        const yDist = ball2.y - ball1.y;

        if (xVelocityDiff * xDist + yVelocityDiff * yDist >= 0) {
            const angle = -Math.atan2(ball2.y - ball1.y, ball2.x - ball1.x);
            const m1 = ball1.mass;
            const m2 = ball2.mass;

            const u1 = rotate(ball1.dx, ball1.dy, angle);
            const u2 = rotate(ball2.dx, ball2.dy, angle);

            const v1 = { x: u1.x * (m1 - m2) / (m1 + m2) + u2.x * 2 * m2 / (m1 + m2), y: u1.y };
            const v2 = { x: u2.x * (m1 - m2) / (m1 + m2) + u1.x * 2 * m1 / (m1 + m2), y: u2.y };

            const vFinal1 = rotate(v1.x, v1.y, -angle);
            const vFinal2 = rotate(v2.x, v2.y, -angle);

            ball1.dx = vFinal1.x;
            ball1.dy = vFinal1.y;
            ball2.dx = vFinal2.x;
            ball2.dy = vFinal2.y;
        }
    }

    function checkWeaponHit(attacker, defender) {
        if (defender.iframes > 0) return false;

        const orbitDist = attacker.radius + 5 + attacker.wLength / 2;
        const wx = attacker.x + Math.cos(attacker.angle) * orbitDist;
        const wy = attacker.y + Math.sin(attacker.angle) * orbitDist;

        const dx = defender.x - wx;
        const dy = defender.y - wy;

        const localX = dx * Math.cos(-attacker.angle) - dy * Math.sin(-attacker.angle);
        const localY = dx * Math.sin(-attacker.angle) + dy * Math.cos(-attacker.angle);

        const halfW = attacker.wLength / 2;
        const halfH = attacker.wWidth / 2;

        let closestX = localX;
        let closestY = localY;

        if (closestX < -halfW) closestX = -halfW;
        else if (closestX > halfW) closestX = halfW;

        if (closestY < -halfH) closestY = -halfH;
        else if (closestY > halfH) closestY = halfH;

        const distX = localX - closestX;
        const distY = localY - closestY;

        return (distX * distX) + (distY * distY) < (defender.radius * defender.radius);
    }

    function getWeaponCorners(b) {
        const orbitDist = b.radius + 5 + b.wLength / 2;
        const cx = b.x + Math.cos(b.angle) * orbitDist;
        const cy = b.y + Math.sin(b.angle) * orbitDist;
        const hw = b.wLength / 2;
        const hh = b.wWidth / 2;
        const cosA = Math.cos(b.angle);
        const sinA = Math.sin(b.angle);

        return [
            { x: cx + hw*cosA - hh*sinA, y: cy + hw*sinA + hh*cosA },
            { x: cx + hw*cosA - (-hh)*sinA, y: cy + hw*sinA + (-hh)*cosA },
            { x: cx + (-hw)*cosA - (-hh)*sinA, y: cy + (-hw)*sinA + (-hh)*cosA },
            { x: cx + (-hw)*cosA - hh*sinA, y: cy + (-hw)*sinA + hh*cosA }
        ];
    }

    function doPolygonsIntersect(a, b) {
        const polygons = [a, b];
        for (let i = 0; i < polygons.length; i++) {
            const polygon = polygons[i];
            for (let i1 = 0; i1 < polygon.length; i1++) {
                const i2 = (i1 + 1) % polygon.length;
                const p1 = polygon[i1];
                const p2 = polygon[i2];
                const normal = { x: p2.y - p1.y, y: p1.x - p2.x };

                let minA = undefined, maxA = undefined;
                for (let j = 0; j < a.length; j++) {
                    const projected = normal.x * a[j].x + normal.y * a[j].y;
                    if (minA === undefined || projected < minA) minA = projected;
                    if (maxA === undefined || projected > maxA) maxA = projected;
                }

                let minB = undefined, maxB = undefined;
                for (let j = 0; j < b.length; j++) {
                    const projected = normal.x * b[j].x + normal.y * b[j].y;
                    if (minB === undefined || projected < minB) minB = projected;
                    if (maxB === undefined || projected > maxB) maxB = projected;
                }

                if (maxA < minB || maxB < minA) return false;
            }
        }
        return true;
    }

    function checkWeaponVsWeapon(b1, b2) {
        if (b1.weaponCooldown > 0 || b2.weaponCooldown > 0) return false;
        const poly1 = getWeaponCorners(b1);
        const poly2 = getWeaponCorners(b2);
        return doPolygonsIntersect(poly1, poly2);
    }

    function checkCollisions() {
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                const dx = balls[i].x - balls[j].x;
                const dy = balls[i].y - balls[j].y;
                const distance = Math.hypot(dx, dy);

                if (distance < balls[i].radius + balls[j].radius) {
                    resolveCollision(balls[i], balls[j]);
                }
            }
        }

        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                if (checkWeaponVsWeapon(balls[i], balls[j])) {
                    balls[i].spinSpeed *= -1;
                    balls[j].spinSpeed *= -1;
                    balls[i].weaponCooldown = 15;
                    balls[j].weaponCooldown = 15;
                    
                    playHitSound();
                    triggerShake();
                    
                    const orbitDist1 = balls[i].radius + 5 + balls[i].wLength / 2;
                    const wx1 = balls[i].x + Math.cos(balls[i].angle) * orbitDist1;
                    const wy1 = balls[i].y + Math.sin(balls[i].angle) * orbitDist1;
                    
                    const orbitDist2 = balls[j].radius + 5 + balls[j].wLength / 2;
                    const wx2 = balls[j].x + Math.cos(balls[j].angle) * orbitDist2;
                    const wy2 = balls[j].y + Math.sin(balls[j].angle) * orbitDist2;

                    const clashX = (wx1 + wx2) / 2;
                    const clashY = (wy1 + wy2) / 2;

                    spawnParticles(clashX, clashY, '#ffffff');
                }
            }
        }

        for (let i = 0; i < balls.length; i++) {
            for (let j = 0; j < balls.length; j++) {
                if (i !== j) {
                    if (checkWeaponHit(balls[i], balls[j])) {
                        balls[j].health -= balls[i].damage;
                        balls[j].iframes = 30;
                        playHitSound();
                        triggerShake();
                        spawnParticles(balls[j].x, balls[j].y, balls[j].color);

                        if (balls[i].type === 'Sword') {
                            let sign = balls[i].spinSpeed < 0 ? -1 : 1;
                            let currentPeriod = (2 * Math.PI) / (Math.abs(balls[i].spinSpeed) * 60);
                            let newPeriod = currentPeriod - 0.01;
                            if (newPeriod < 0.05) newPeriod = 0.05;
                            balls[i].spinSpeed = sign * ((2 * Math.PI) / (newPeriod * 60));
                        } else if (balls[i].type === 'Spear') {
                            balls[i].wLength += 1.5;
                            balls[i].damage += 0.5;
                        } else if (balls[i].type === 'Axe') {
                            balls[i].health += 5;
                        }
                    }
                }
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);

        if (isPaused) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(particle => {
            particle.draw();
            particle.update();
        });

        particles = particles.filter(particle => particle.alpha > 0);

        if (balls.length <= 1) {
            balls.forEach(ball => {
                ball.dx = 0;
                ball.dy = 0;
                ball.draw();
            });

            ctx.fillStyle = '#000';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            if (balls.length === 1) {
                ctx.fillText(balls[0].type + ' WINS!', canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = balls[0].color;
                ctx.font = 'bold 30px Arial';
                ctx.fillText(Math.floor(balls[0].health) + ' HP LEFT', canvas.width / 2, canvas.height / 2 + 30);
            } else {
                ctx.fillText('DOUBLE KO!', canvas.width / 2, canvas.height / 2);
            }
            return; 
        }

        balls.forEach(ball => {
            ball.draw();
            ball.update();
        });

        checkCollisions();
        balls = balls.filter(ball => ball.health > 0);
    }
</script>

</body>
</html>
