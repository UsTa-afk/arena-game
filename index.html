<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Arena</title>
<style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #2c3e50; font-family: sans-serif; }
    canvas { border: 4px solid #000; background: #fcf9f2; display: none; transition: transform 0.05s; }
    #menu { background: white; padding: 40px; border-radius: 15px; text-align: center; max-width: 500px; }
    .card { border: 3px solid #ddd; border-radius: 10px; padding: 20px; cursor: pointer; display: inline-block; margin: 10px; width: 80px; }
    .card.p1 { border-color: #e74c3c; background: #fadbd8; }
    .card.p2 { border-color: #3498db; background: #d6eaf8; }
    button { background: #27ae60; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 10px;}
    #restart { position: absolute; top: 20px; right: 20px; background: #e74c3c; display: none; }
</style>
</head>
<body>

<div id="menu">
    <h1>ARENA BATTLE</h1>
    <h3 id="status">Player 1: Choose</h3>
    <div id="roster"></div>
    <button onclick="location.reload()" style="background:#e74c3c">Reset</button>
    <button id="start" onclick="start()" style="display:none">START</button>
</div>

<canvas id="game" width="600" height="600"></canvas>
<button id="restart" onclick="location.reload()">Reset Game</button>

<script>
    const stats = {
        'Sword': { c: '#fce883', hp: 100, r: 35, s: 4, len: 60, dmg: 1 },
        'Spear': { c: '#5dd1b2', hp: 80, r: 25, s: 6, len: 80, dmg: 1.5 },
        'Axe':   { c: '#e67e22', hp: 150, r: 45, s: 2.5, len: 50, dmg: 2 }
    };

    let p1 = null, p2 = null, balls = [];
    const ctx = document.getElementById('game').getContext('2d');
    const hitSound = new Audio('clash.mp3');

    const roster = document.getElementById('roster');
    for(let k in stats) {
        roster.innerHTML += `<div class="card" onclick="sel('${k}', this)"><div style="width:40px;height:40px;background:${stats[k].c};border-radius:50%;margin:auto"></div><b>${k}</b></div>`;
    }

    function sel(type, el) {
        if (!p1) {
            p1 = type;
            el.classList.add('p1');
            document.getElementById('status').innerText = "Player 2: Choose";
        } else if (!p2 && type !== p1) {
            p2 = type;
            el.classList.add('p2');
            document.getElementById('status').innerText = "Ready!";
            document.getElementById('start').style.display = "inline-block";
        }
    }

    class Ball {
        constructor(type, num) {
            let st = stats[type];
            Object.assign(this, st);
            this.type = type;
            this.x = num === 1 ? 150 : 450;
            this.y = 300;
            this.dx = num === 1 ? this.s : -this.s;
            this.dy = Math.random() * 4 - 2;
            this.a = 0;
            this.spin = Math.random() * 0.05 + 0.05;
            this.inv = 0;
        }

        update() {
            if (this.x + this.r > 600 || this.x - this.r < 0) this.dx *= -1;
            if (this.y + this.r > 600 || this.y - this.r < 0) this.dy *= -1;
            this.x += this.dx;
            this.y += this.dy;
            this.a += this.spin;
            if (this.inv > 0) this.inv--;

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = (this.inv > 0 && Math.floor(Date.now() / 100) % 2 === 0) ? '#fff' : this.c;
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.a);
            ctx.fillStyle = '#333';
            ctx.fillRect(this.r, -8, this.len, 16);
            ctx.restore();
        }
    }

    function start() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('restart').style.display = 'block';
        balls.push(new Ball(p1, 1), new Ball(p2, 2));
        loop();
    }

    function loop() {
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, 600, 600);

        if (balls.length < 2) {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            if (balls.length === 1) {
                ctx.fillText(balls[0].type + ' WINS!', 300, 260);
                ctx.fillText(Math.floor(balls[0].hp) + ' HP', 300, 320);
            } else {
                ctx.fillText('DOUBLE KO!', 300, 300);
            }
            return;
        }

        const b1 = balls[0], b2 = balls[1];
        const dx = b2.x - b1.x, dy = b2.y - b1.y;
        const dist = Math.hypot(dx, dy);

        if (dist < b1.r + b2.r) {
            const nx = dx / dist, ny = dy / dist;
            const p = 2 * (b1.dx * nx + b1.dy * ny - b2.dx * nx - b2.dy * ny) / (b1.r + b2.r);
            b1.dx -= p * b2.r * nx; b1.dy -= p * b2.r * ny;
            b2.dx += p * b1.r * nx; b2.dy += p * b1.r * ny;
            
            const overlap = (b1.r + b2.r - dist) / 2;
            b1.x -= overlap * nx; b1.y -= overlap * ny;
            b2.x += overlap * nx; b2.y += overlap * ny;
        }

        for (let i = 0; i < balls.length; i++) {
            for (let j = 0; j < balls.length; j++) {
                if (i !== j && balls[j].inv === 0) {
                    let wx = balls[i].x + Math.cos(balls[i].a) * (balls[i].r + balls[i].len);
                    let wy = balls[i].y + Math.sin(balls[i].a) * (balls[i].r + balls[i].len);
                    
                    if (Math.hypot(balls[j].x - wx, balls[j].y - wy) < balls[j].r) {
                        balls[j].hp -= balls[i].dmg;
                        balls[j].inv = 30;
                        hitSound.cloneNode().play().catch(e=>{});
                        document.getElementById('game').style.transform = `translate(${Math.random()*8-4}px, ${Math.random()*8-4}px)`;
                        setTimeout(() => document.getElementById('game').style.transform = 'none', 50);

                        if(balls[i].type === 'Spear') balls[i].len += 1.5;
                        if(balls[i].type === 'Sword') balls[i].spin *= (balls[i].spin < 0 ? 1.05 : -1.05);
                        if(balls[i].type === 'Axe') balls[i].hp += 5;
                    }
                }
            }
        }

        balls.forEach(b => b.update());
        balls = balls.filter(b => b.hp > 0);

        ctx.fillStyle = '#000';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`${balls[0]?.type} HP: ${Math.max(0, Math.floor(balls[0]?.hp||0))}`, 20, 30);
        ctx.textAlign = 'right';
        ctx.fillText(`${balls[1]?.type} HP: ${Math.max(0, Math.floor(balls[1]?.hp||0))}`, 580, 30);
    }
</script>
</body>
</html>
