<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Physics</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #2c3e50;
        font-family: 'Arial', sans-serif;
        overflow: hidden;
    }
    canvas {
        border: 4px solid #000;
        background-color: #fcf9f2;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        display: none;
    }
    @keyframes shake {
        0% { transform: translate(2px, 2px) rotate(0deg); }
        20% { transform: translate(-2px, -2px) rotate(-1deg); }
        40% { transform: translate(-3px, 0px) rotate(1deg); }
        60% { transform: translate(3px, 2px) rotate(0deg); }
        80% { transform: translate(1px, -2px) rotate(-1deg); }
        100% { transform: translate(0px, 0px) rotate(0deg); }
    }
    .shake {
        animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
    }
    #menu {
        background-color: white;
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        max-width: 600px;
        width: 100%;
    }
    h1 { margin-top: 0; color: #333; }
    h3 { color: #666; margin-bottom: 20px; }
    .weapon-grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
    }
    .weapon-card {
        border: 3px solid #ddd;
        border-radius: 10px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s;
        width: 100px;
    }
    .weapon-card:hover {
        transform: translateY(-5px);
        border-color: #aaa;
    }
    .weapon-card.p1-selected {
        border-color: #e74c3c;
        background-color: #fadbd8;
    }
    .weapon-card.p2-selected {
        border-color: #3498db;
        background-color: #d6eaf8;
    }
    .circle-preview {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin: 0 auto 10px auto;
        border: 2px solid #000;
    }
    .btn-container {
        display: flex;
        justify-content: center;
        gap: 15px;
    }
    #startBtn {
        background-color: #27ae60;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 5px;
        cursor: pointer;
        opacity: 0.5;
        pointer-events: none;
    }
    #startBtn.ready {
        opacity: 1;
        pointer-events: all;
    }
    #startBtn:hover {
        background-color: #2ecc71;
    }
    #resetMenuBtn {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 5px;
        cursor: pointer;
    }
    #resetMenuBtn:hover {
        background-color: #c0392b;
    }
    #restartBtn {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        background: #e74c3c;
        color: white;
        border: none;
        cursor: pointer;
        display: none;
        font-weight: bold;
        border-radius: 5px;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>ARENA BATTLE</h1>
    <h3 id="statusText">Player 1: Choose your fighter</h3>
    
    <div class="weapon-grid">
        <div class="weapon-card" onclick="selectWeapon('Sword')">
            <div class="circle-preview" style="background-color: #fce883;"></div>
            <b>Sword</b><br>
            <small>HP: 100</small>
        </div>

        <div class="weapon-card" onclick="selectWeapon('Spear')">
            <div class="circle-preview" style="background-color: #5dd1b2;"></div>
            <b>Spear</b><br>
            <small>HP: 80</small>
        </div>

        <div class="weapon-card" onclick="selectWeapon('Axe')">
            <div class="circle-preview" style="background-color: #e67e22;"></div>
            <b>Axe</b><br>
            <small>HP: 150</small>
        </div>
    </div>

    <div class="btn-container">
        <button id="resetMenuBtn" onclick="resetSelection()">Seçimi Sıfırla</button>
        <button id="startBtn" onclick="startGame()">START FIGHT</button>
    </div>
</div>

<canvas id="gameCanvas" width="600" height="600"></canvas>
<button id="restartBtn" onclick="location.reload()">Reset Game</button>

<script>
    const stats = {
        'Sword': { c: '#fce883', hp: 100, r: 35, s: 4, len: 60, dmg: 1 },
        'Spear': { c: '#5dd1b2', hp: 80, r: 25, s: 6, len: 80, dmg: 1.5 },
        'Axe':   { c: '#e67e22', hp: 150, r: 45, s: 2.5, len: 50, dmg: 2 }
    };

    let player1Choice = null;
    let player2Choice = null;
    let balls = [];
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hitSound = new Audio('clash.mp3');

    function selectWeapon(type) {
        const cards = document.querySelectorAll('.weapon-card');
        const status = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');

        if (!player1Choice) {
            player1Choice = type;
            highlightCard(cards, type, 'p1-selected');
            status.innerText = "Player 2: Choose your fighter";
        } else if (!player2Choice && player1Choice !== type) {
            player2Choice = type;
            highlightCard(cards, type, 'p2-selected');
            status.innerText = "Ready to Fight!";
            startBtn.classList.add('ready');
        }
    }

    function highlightCard(cards, type, cssClass) {
        cards.forEach(card => {
            if(card.innerText.includes(type)) {
                card.classList.add(cssClass);
            }
        });
    }

    function resetSelection() {
        player1Choice = null;
        player2Choice = null;
        const cards = document.querySelectorAll('.weapon-card');
        cards.forEach(card => {
            card.classList.remove('p1-selected');
            card.classList.remove('p2-selected');
        });
        document.getElementById('statusText').innerText = "Player 1: Choose your fighter";
        document.getElementById('startBtn').classList.remove('ready');
    }

    function triggerShake() {
        canvas.classList.remove('shake');
        void canvas.offsetWidth;
        canvas.classList.add('shake');
    }

    class Ball {
        constructor(type, num) {
            let st = stats[type];
            Object.assign(this, st);
            this.type = type;
            this.x = num === 1 ? 150 : 450;
            this.y = 300;
            this.dx = num === 1 ? this.s : -this.s;
            this.dy = Math.random() * 4 - 2;
            this.a = 0;
            this.spin = Math.random() * 0.05 + 0.05;
            this.inv = 0;
        }

        update() {
            if (this.x + this.r > 600 || this.x - this.r < 0) this.dx *= -1;
            if (this.y + this.r > 600 || this.y - this.r < 0) this.dy *= -1;
            this.x += this.dx;
            this.y += this.dy;
            this.a += this.spin;
            if (this.inv > 0) this.inv--;

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = (this.inv > 0 && Math.floor(Date.now() / 100) % 2 === 0) ? '#fff' : this.c;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.a);
            ctx.fillStyle = '#333';
            ctx.fillRect(this.r, -8, this.len, 16);
            ctx.strokeRect(this.r, -8, this.len, 16);
            ctx.restore();
        }
    }

    function startGame() {
        if (!player1Choice || !player2Choice) return;
        document.getElementById('menu').style.display = 'none';
        canvas.style.display = 'block';
        document.getElementById('restartBtn').style.display = 'block';
        
        balls.push(new Ball(player1Choice, 1));
        balls.push(new Ball(player2Choice, 2));
        
        hitSound.play().then(() => {
            hitSound.pause();
            hitSound.currentTime = 0;
        }).catch(e => console.log(e));

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (balls.length < 2) {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (balls.length === 1) {
                ctx.fillText(balls[0].type + ' WINS!', 300, 260);
                ctx.fillStyle = balls[0].c;
                ctx.font = 'bold 30px Arial';
                ctx.fillText(Math.floor(balls[0].hp) + ' HP LEFT', 300, 320);
            } else {
                ctx.fillText('DOUBLE KO!', 300, 300);
            }
            return;
        }

        const b1 = balls[0];
        const b2 = balls[1];
        const dx = b2.x - b1.x;
        const dy = b2.y - b1.y;
        const dist = Math.hypot(dx, dy);

        if (dist < b1.r + b2.r) {
            const nx = dx / dist;
            const ny = dy / dist;
            const p = 2 * (b1.dx * nx + b1.dy * ny - b2.dx * nx - b2.dy * ny) / (b1.r + b2.r);
            
            b1.dx -= p * b2.r * nx; 
            b1.dy -= p * b2.r * ny;
            b2.dx += p * b1.r * nx; 
            b2.dy += p * b1.r * ny;
            
            const overlap = (b1.r + b2.r - dist) / 2;
            b1.x -= overlap * nx; 
            b1.y -= overlap * ny;
            b2.x += overlap * nx; 
            b2.y += overlap * ny;
        }

        for (let i = 0; i < balls.length; i++) {
            for (let j = 0; j < balls.length; j++) {
                if (i !== j && balls[j].inv === 0) {
                    let wx = balls[i].x + Math.cos(balls[i].a) * (balls[i].r + balls[i].len);
                    let wy = balls[i].y + Math.sin(balls[i].a) * (balls[i].r + balls[i].len);
                    
                    if (Math.hypot(balls[j].x - wx, balls[j].y - wy) < balls[j].r) {
                        balls[j].hp -= balls[i].dmg;
                        balls[j].inv = 30;
                        
                        let soundClone = hitSound.cloneNode();
                        soundClone.volume = 0.6;
                        soundClone.play().catch(e => console.log(e));
                        
                        triggerShake();

                        if(balls[i].type === 'Spear') balls[i].len += 1.5;
                        if(balls[i].type === 'Sword') {
                            let sign = balls[i].spin < 0 ? -1 : 1;
                            balls[i].spin = sign * (Math.abs(balls[i].spin) + 0.005);
                        }
                        if(balls[i].type === 'Axe') balls[i].hp += 5;
                    }
                }
            }
        }

        balls.forEach(b => b.update());
        balls = balls.filter(b => b.hp > 0);

        if (balls[0]) {
            ctx.fillStyle = balls[0].c;
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(balls[0].type + ' HP: ' + Math.max(0, Math.floor(balls[0].hp)), 20, 20);
        }
        if (balls[1]) {
            ctx.fillStyle = balls[1].c;
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText(balls[1].type + ' HP: ' + Math.max(0, Math.floor(balls[1].hp)), 580, 20);
        }
    }
</script>
</body>
</html>
